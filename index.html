<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1:1 Mobile Replica</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #FFFFFF;
            --text-main: #000000;
            --text-value: #1A1A1A;
        }
        body {
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            margin: 0;
            padding: 40px 16px;
            -webkit-font-smoothing: antialiased;
        }
        .mobile-container {
            width: 100%;
            max-width: 390px; 
            text-align: center;
        }
        .logo-container {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 60px;
            height: 60px;
            margin-bottom: 30px;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
        }
        .pp-logo {
            width: 32px;
            height: auto;
        }
        .headline {
            font-size: 43px;
            font-weight: 900;
            line-height: 1.05;
            color: var(--text-main);
            margin: 0 0 42px 0;
            letter-spacing: -1.2px;
        }
        .headline span {
            display: block;
        }
        .headline .amount-line {
            margin-top: 6px;
        }
        .details-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 32px 24px;
            text-align: left;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.03); 
        }
        .detail-row {
            margin-bottom: 32px;
        }
        .detail-row:last-child {
            margin-bottom: 0;
        }
        .label {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 4px;
            letter-spacing: -0.3px;
        }
        .value {
            font-size: 16px;
            font-weight: 400;
            color: var(--text-value);
            letter-spacing: -0.2px;
            line-height: 1.4;
        }
        .empty-value {
            min-height: 22px; 
        }
    </style>
</head>
<body>
    <div class="mobile-container">
        <div class="logo-container">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b7/PayPal_Logo_Icon_2014.svg" class="pp-logo" alt="PayPal">
        </div>
        <h1 class="headline">
            <span>Funded Edge</span>
            <span>sent you</span>
            <span class="amount-line">$32,590.00 USD</span>
        </h1>
        <div class="details-card">
            <div class="detail-row">
                <div class="label">Money received</div>
                <div class="value">$32,590.00 USD</div>
            </div>
            <div class="detail-row">
                <div class="label">Transaction ID</div>
                <div class="value empty-value"></div>
            </div>
            <div class="detail-row">
                <div class="label">Transaction date</div>
                <div class="value">May 7, 2025</div>
            </div>
            <div class="detail-row">
                <div class="label">Note from Funded Edge</div>
                <div class="value">You have received a payout from Funded<br>Edge!</div>
            </div>
        </div>
    </div>
</body>
</html>
